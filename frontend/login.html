<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login - FastFoodmanibe</title>
    <link rel="icon" type="image/png" href="img/panda-logo.png">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>

    <div class="login-container">
        <div class="login-box">
            <img src="img/panda-logo.png" alt="FastFoodmanibe" class="login-logo">
            <h1>FastFoodmanibe</h1>
            <p>Iniciar sesión</p>

            <form id="loginForm">
                <input type="email" id="email" placeholder="Correo" required>

                <div class="password-wrapper">
                    <input type="password" id="password" placeholder="Contraseña" required>
                    <button type="button" id="btnMostrarPassword" aria-label="Mostrar contraseña">👁️</button>
                </div>

                <button type="submit">Ingresar</button>
            </form>

            <div id="mensaje" class="mensaje"></div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
